name: OCI VM Snagger

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 */6 * * *'

jobs:
  snag_vm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install OCI SDK
        run: |
          python -m pip install --upgrade pip
          pip install oci

      - name: Run VM Snagger Script
        run: python vm_snag.py
