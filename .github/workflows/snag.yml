name: Oracle VM Snagger

# --- Schedule every 6 hours ---
on:
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours
  workflow_dispatch:       # allows manual trigger

jobs:
  snag_vm:
    runs-on: ubuntu-latest
    timeout-minutes: 360    # 6 hours max
    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 3️⃣ Upgrade pip (optional but recommended)
      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      # 4️⃣ Install OCI CLI non-interactively
      - name: Install OCI CLI
        run: |
          bash -c "$(curl -L https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh)" -- --accept-all-defaults
          echo "PATH=$PATH:/home/runner/bin" >> $GITHUB_ENV  # Correct PATH for next step

      # 5️⃣ Run VM snagger Python script (logging inside Python)
      - name: Run VM Snagger Script
        shell: bash
        run: python -u vm_snag.py

      # 6️⃣ Upload logs as artifact
      - name: Upload Logs
        uses: actions/upload-artifact@v4
        with:
          name: vm-snagger-logs
          path: vm_snag.log
