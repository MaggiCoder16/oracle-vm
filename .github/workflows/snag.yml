# File: .github/workflows/vm_snag.yml
name: OCI VM Snagger

on:
  push:
    branches:
      - main
  schedule:
    # Runs every 6 hours: 0:00, 6:00, 12:00, 18:00 UTC
    - cron: '0 */6 * * *'

jobs:
  snag_vm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install OCI Python SDK
        run: |
          python -m pip install --upgrade pip
          pip install oci

      - name: Install OCI CLI
        run: |
          curl -L https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh | bash
          echo 'export PATH=$PATH:/home/runner/bin' >> $GITHUB_ENV

      - name: Run VM Snagger Script
        run: python -u vm_snag.py | tee vm_snag.log

      - name: Upload Logs
        uses: actions/upload-artifact@v3
        with:
          name: vm-snagger-logs
          path: vm_snag.log
