# File: .github/workflows/vm_snag.yml
name: OCI VM Snagger

on:
  push:
    branches:
      - main
  schedule:
    # Runs every 6 hours: 0:00, 6:00, 12:00, 18:00 UTC
    - cron: '0 */6 * * *'

jobs:
  snag_vm:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      # 3️⃣ Install OCI Python SDK (optional, your script uses CLI, not SDK)
      - name: Install OCI Python SDK
        run: |
          python -m pip install --upgrade pip
          pip install oci

      # 4️⃣ Install OCI CLI non-interactively
      - name: Install OCI CLI
        run: |
          bash -c "$(curl -L https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh)" -- --accept-all-defaults
          echo "export PATH=$PATH:/home/runner/bin" >> $GITHUB_ENV

      # 5️⃣ Run your script with live logs
      - name: Run VM Snagger Script
        run: python -u vm_snag.py | tee vm_snag.log
        env:
          PATH: ${{ env.PATH }}:/home/runner/bin  # ensure 'oci' is found

      # 6️⃣ Upload logs as artifact
      - name: Upload Logs
        uses: actions/upload-artifact@v4
        with:
          name: vm-snagger-logs
          path: vm_snag.log
